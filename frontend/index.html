<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f0f4f8;
      }

      .todo-container {
        max-width: 620px;
        margin: 50px auto;
        padding: 24px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      .todo-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid #e9eff5;
      }

      .todo-item:last-child {
        border-bottom: none;
      }

      .todo-actions button {
        margin-left: 5px;
      }

      .edit-input {
        width: 100%;
      }

      .empty-state {
        color: #6b7280;
        text-align: center;
        padding: 24px 0;
      }
    </style>
  </head>

  <body>
    <div class="todo-container">
      <h3 class="text-center mb-4">Notes App</h3>
      <div class="input-group mb-4">
        <input
          id="todo-input"
          type="text"
          class="form-control"
          placeholder="Write a new note"
        />
        <button class="btn btn-primary" onclick="addTodo()">Add</button>
      </div>
      <ul id="todo-list" class="list-unstyled"></ul>
    </div>

    <script>
      const apiUrl = "http://localhost:3002";
      let todos = [];

      async function loadTodos() {
        try {
          const res = await fetch(`${apiUrl}/notes`);
          todos = await res.json();
          todos = todos.map((note) => ({
            id: note.id,
            text: note.itemdes,
            editing: false,
          }));
          renderTodos();
        } catch (error) {
          console.error("Error loading notes:", error);
        }
      }

      function renderTodos() {
        const list = document.getElementById("todo-list");
        list.innerHTML = "";

        if (!todos.length) {
          list.innerHTML =
            '<li class="empty-state">No notes yet. Add one above.</li>';
          return;
        }

        todos.forEach((todo, index) => {
          const li = document.createElement("li");
          li.className = "todo-item";

          if (todo.editing) {
            li.innerHTML = `
              <input id="edit-${todo.id}" class="form-control edit-input" type="text" value="${escapeHtml(
                todo.text,
              )}" />
              <div class="todo-actions">
                <button class="btn btn-success btn-sm" onclick="saveTodo(${index})">Save</button>
                <button class="btn btn-secondary btn-sm" onclick="cancelEdit(${index})">Cancel</button>
              </div>
            `;
          } else {
            li.innerHTML = `
              <span>${escapeHtml(todo.text)}</span>
              <div class="todo-actions">
                <button class="btn btn-sm btn-warning" onclick="editTodo(${index})">Edit</button>
                <button class="btn btn-sm btn-danger" onclick="deleteTodo(${index})">Delete</button>
              </div>
            `;
          }

          list.appendChild(li);
        });
      }

      function escapeHtml(value) {
        return value
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      async function addTodo() {
        const input = document.getElementById("todo-input");
        const text = input.value.trim();
        if (!text) return;

        try {
          const res = await fetch(`${apiUrl}/notes`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text }),
          });

          if (!res.ok) {
            const error = await res.json();
            throw new Error(error.error || "Failed to add note");
          }

          const note = await res.json();
          todos.unshift({ id: note.id, text: note.text, editing: false });
          input.value = "";
          renderTodos();
        } catch (error) {
          console.error("Error adding note:", error);
        }
      }

      async function deleteTodo(index) {
        const todo = todos[index];
        if (!todo) return;

        try {
          const res = await fetch(`${apiUrl}/notes/${todo.id}`, {
            method: "DELETE",
          });
          if (!res.ok) {
            const error = await res.json();
            throw new Error(error.error || "Failed to delete note");
          }
          todos.splice(index, 1);
          renderTodos();
        } catch (error) {
          console.error("Error deleting note:", error);
        }
      }

      function editTodo(index) {
        todos[index].editing = true;
        renderTodos();
      }

      function cancelEdit(index) {
        todos[index].editing = false;
        renderTodos();
      }

      async function saveTodo(index) {
        const todo = todos[index];
        const input = document.getElementById(`edit-${todo.id}`);
        if (!input) return;

        const newText = input.value.trim();
        if (!newText) return;

        try {
          const res = await fetch(`${apiUrl}/notes/${todo.id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: newText }),
          });

          if (!res.ok) {
            const error = await res.json();
            throw new Error(error.error || "Failed to update note");
          }

          todos[index].text = newText;
          todos[index].editing = false;
          renderTodos();
        } catch (error) {
          console.error("Error saving note:", error);
        }
      }

      document.addEventListener("DOMContentLoaded", loadTodos);
    </script>
  </body>
</html>
